<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexeo car Racing - Nexeo AI Intelligence</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #111; }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            background: rgba(0, 0, 0, 0.85);
            padding: 20px;
            border-radius: 12px;
            border: 2px solid #00ffcc;
            pointer-events: none;
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.4);
            z-index: 10;
        }
        #ai-radio {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 250px;
            color: #00ffcc;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 8px;
            font-size: 13px;
            border-left: 4px solid #00ffcc;
            z-index: 10;
        }
        .speed { font-size: 32px; color: #00ffcc; font-weight: bold; text-shadow: 0 0 10px #00ffcc; }
        .label { font-size: 12px; color: #ffcc00; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 5px; }
        .controls { font-size: 11px; color: #888; margin-top: 10px; line-height: 1.4; }
        #msg { position: absolute; bottom: 20px; width: 100%; text-align: center; color: white; font-size: 14px; opacity: 0.6; pointer-events: none; transition: all 0.3s; }
    </style>
</head>
<body>

    <div id="ui">
        <div class="label">Car Racing - Powered by Nexeo</div>
        <div class="speed" id="speedometer">0 km/h</div>
        <div id="position" style="margin-top:5px; font-size:14px;">Pilot : You</div>
        <div class="controls">
            Z / Q / S / D or ARROWS<br>
            Invisible walls activated - Exit impossible
        </div>
    </div>

    

    <div id="msg">Cross the city !</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        // CONFIGURATION GEMINI API
        const apiKey = ""; 
        
        let scene, camera, renderer, clock;
        let playerCar;
        let aiCars = [];
        let trackPoints = [];
        let keys = {};
        let trackCurve;

        const CAR_WIDTH = 2.2;
        const CAR_LENGTH = 4.5;
        const TRACK_WIDTH = 20; 
        const CAR_Y_OFFSET = 0.8;

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1a2a4a); 
            scene.fog = new THREE.Fog(0x1a2a4a, 50, 600);

            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 3000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            document.body.appendChild(renderer.domElement);

            clock = new THREE.Clock();

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
            scene.add(ambientLight);

            const sun = new THREE.DirectionalLight(0xffccaa, 1.2);
            sun.position.set(150, 200, 100);
            sun.castShadow = true;
            sun.shadow.camera.left = -300;
            sun.shadow.camera.right = 300;
            sun.shadow.camera.top = 300;
            sun.shadow.camera.bottom = -300;
            sun.shadow.mapSize.width = 2048;
            sun.shadow.mapSize.height = 2048;
            scene.add(sun);

            createTrack();
            createCityAndTrees();

            playerCar = createCar(0xff2200);
            playerCar.position.set(0, CAR_Y_OFFSET, 0);
            playerCar.userData = { speed: 0, angle: 0, maxSpeed: 2.8, acceleration: 0.05 };
            scene.add(playerCar);

            const aiColors = [0x00ffcc, 0x0088ff, 0xff00cc];
            const aiNames = ["Gemini-1", "Gemini-2", "Gemini-3"];
            for(let i = 0; i < 3; i++) {
                const aiCar = createCar(aiColors[i]);
                aiCar.position.set((i + 1) * 5 - 7.5, CAR_Y_OFFSET, -30);
                aiCar.userData = { 
                    name: aiNames[i],
                    targetNode: 1, 
                    speed: 1.5,
                    maxSpeed: 1.8 + Math.random(),
                    offset: (Math.random() - 0.5) * 12,
                    rotationSmooth: 0.07,
                    strategy: "neutre"
                };
                aiCars.push(aiCar);
                scene.add(aiCar);
            }

            window.addEventListener('keydown', e => keys[e.code] = true);
            window.addEventListener('keyup', e => keys[e.code] = false);
            window.addEventListener('resize', onWindowResize);

            setInterval(askGeminiForStrategy, 5000);
        }

        async function askGeminiForStrategy() {
            if (!apiKey && typeof __initial_auth_token === 'undefined') return;

            const aiStatus = aiCars.map(ai => {
                const distToPlayer = ai.position.distanceTo(playerCar.position);
                return `${ai.userData.name} est à ${Math.round(distToPlayer)}m du joueur.`;
            }).join(" ");

            const prompt = `Tu es le contrôleur de 3 voitures de course IA (Gemini-1, Gemini-2, Gemini-3). 
            Statut actuel : ${aiStatus}. Le joueur roule à ${Math.round(playerCar.userData.speed * 160)}km/h.
            Réponds uniquement en JSON avec ce format:
            {
              "strategies": [
                {"name": "Gemini-1", "speed": 2.2, "offset": -5, "comment": "Je te rattrape !"},
                {"name": "Gemini-2", "speed": 1.9, "offset": 5, "comment": "Attention à ton aile droite."},
                {"name": "Gemini-3", "speed": 2.5, "offset": 0, "comment": "Vitesse maximale activée !"}
              ]
            }
            Les vitesses doivent être entre 1.0 et 3.0. L'offset entre -8 et 8.`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }],
                        generationConfig: { responseMimeType: "application/json" }
                    })
                });

                const result = await response.json();
                const data = JSON.parse(result.candidates[0].content.parts[0].text);

                data.strategies.forEach(strat => {
                    const ai = aiCars.find(c => c.userData.name === strat.name);
                    if (ai) {
                        ai.userData.speed = strat.speed;
                        ai.userData.offset = strat.offset;
                        if (strat.comment) {
                            document.getElementById('radio-text').innerText = `${strat.name}: "${strat.comment}"`;
                        }
                    }
                });
            } catch (error) {
                console.error("Erreur Gemini API:", error);
            }
        }

        function createCar(color) {
            const group = new THREE.Group();
            const body = new THREE.Mesh(
                new THREE.BoxGeometry(CAR_WIDTH, 0.8, CAR_LENGTH),
                new THREE.MeshPhongMaterial({ color: color, shininess: 100 })
            );
            body.position.y = 0.5;
            body.castShadow = true;
            group.add(body);

            const roof = new THREE.Mesh(
                new THREE.BoxGeometry(CAR_WIDTH * 0.75, 0.7, CAR_LENGTH * 0.4),
                new THREE.MeshPhongMaterial({ color: 0x111111, shininess: 100 })
            );
            roof.position.y = 1.2;
            roof.position.z = -0.3;
            group.add(roof);

            const wing = new THREE.Mesh(
                new THREE.BoxGeometry(CAR_WIDTH * 0.9, 0.1, 0.8),
                new THREE.MeshPhongMaterial({ color: 0x222222 })
            );
            wing.position.set(0, 1.1, -1.8);
            group.add(wing);

            const wheelGeo = new THREE.CylinderGeometry(0.45, 0.45, 0.6, 16);
            const wheelMat = new THREE.MeshPhongMaterial({ color: 0x080808 });
            const wheelPositions = [[-1.1, 0.4, 1.5], [1.1, 0.4, 1.5], [-1.1, 0.4, -1.5], [1.1, 0.4, -1.5]];
            wheelPositions.forEach(pos => {
                const wheel = new THREE.Mesh(wheelGeo, wheelMat);
                wheel.rotation.z = Math.PI / 2;
                wheel.position.set(...pos);
                group.add(wheel);
            });
            return group;
        }

        function createTrack() {
            trackCurve = new THREE.CatmullRomCurve3([
                new THREE.Vector3(0, 0, 0),
                new THREE.Vector3(60, 0, 120),
                new THREE.Vector3(200, 0, 180),
                new THREE.Vector3(350, 0, 60),
                new THREE.Vector3(350, 0, -120),
                new THREE.Vector3(150, 0, -250),
                new THREE.Vector3(-150, 0, -350),
                new THREE.Vector3(-300, 0, -150),
                new THREE.Vector3(-200, 0, 60)
            ], true);

            trackPoints = trackCurve.getPoints(400);
            const shape = new THREE.Shape();
            shape.moveTo(0, -TRACK_WIDTH/2);
            shape.lineTo(0, TRACK_WIDTH/2);

            const geometry = new THREE.ExtrudeGeometry(shape, { steps: 400, extrudePath: trackCurve, bevelEnabled: false });
            const material = new THREE.MeshPhongMaterial({ color: 0x222222 });
            const trackMesh = new THREE.Mesh(geometry, material);
            trackMesh.receiveShadow = true;
            scene.add(trackMesh);

            const lineMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
            const lineGeo = new THREE.BoxGeometry(0.2, 0.01, 2);
            for(let i=0; i < trackPoints.length; i+=4) {
                const line = new THREE.Mesh(lineGeo, lineMat);
                line.position.copy(trackPoints[i]);
                line.position.y = 0.02;
                const nextP = trackPoints[(i + 1) % trackPoints.length];
                line.lookAt(nextP);
                scene.add(line);
            }

            const barrierGeo = new THREE.BoxGeometry(0.5, 1.5, 5);
            const matWhite = new THREE.MeshPhongMaterial({color: 0xffffff});
            const matRed = new THREE.MeshPhongMaterial({color: 0xff0000});
            for(let i=0; i < trackPoints.length; i+=2) {
                const p = trackPoints[i];
                const nextP = trackPoints[(i+1)%trackPoints.length];
                const tangent = new THREE.Vector3().subVectors(nextP, p).normalize();
                const lateral = new THREE.Vector3(-tangent.z, 0, tangent.x);
                [1, -1].forEach(side => {
                    const barrier = new THREE.Mesh(barrierGeo, (i/2) % 2 === 0 ? matWhite : matRed);
                    barrier.position.copy(p).add(lateral.clone().multiplyScalar(side * (TRACK_WIDTH/2 + 0.5)));
                    barrier.position.y = 0.75;
                    barrier.lookAt(nextP.clone().add(lateral.clone().multiplyScalar(side * (TRACK_WIDTH/2 + 0.5))));
                    scene.add(barrier);
                });
            }

            const groundGeo = new THREE.PlaneGeometry(5000, 5000);
            const groundMat = new THREE.MeshPhongMaterial({ color: 0x113311 });
            const ground = new THREE.Mesh(groundGeo, groundMat);
            ground.rotation.x = -Math.PI / 2;
            ground.position.y = -0.1;
            ground.receiveShadow = true;
            scene.add(ground);
        }

        function createCityAndTrees() {
            for (let i = 0; i < trackPoints.length; i += 5) {
                const p = trackPoints[i];
                const nextP = trackPoints[(i + 1) % trackPoints.length];
                const tangent = new THREE.Vector3().subVectors(nextP, p).normalize();
                const lateral = new THREE.Vector3(-tangent.z, 0, tangent.x);
                const side = (i % 10 === 0) ? 1 : -1;
                const distance = 35 + Math.random() * 20;
                const pos = p.clone().add(lateral.clone().multiplyScalar(side * distance));

                if (Math.random() > 0.3) {
                    const h = 20 + Math.random() * 60;
                    const w = 12 + Math.random() * 15;
                    const bGeo = new THREE.BoxGeometry(w, h, w);
                    const bMat = new THREE.MeshPhongMaterial({ 
                        color: new THREE.Color().setHSL(Math.random(), 0.1, 0.2 + Math.random() * 0.2) 
                    });
                    const building = new THREE.Mesh(bGeo, bMat);
                    building.position.set(pos.x, h/2, pos.z);
                    building.castShadow = true;
                    building.receiveShadow = true;
                    scene.add(building);
                } else {
                    const tree = new THREE.Group();
                    const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.8, 1, 6), new THREE.MeshPhongMaterial({color: 0x3d1f1b}));
                    trunk.position.y = 3;
                    tree.add(trunk);
                    const leaves = new THREE.Mesh(new THREE.DodecahedronGeometry(5), new THREE.MeshPhongMaterial({color: 0x1a3a1a}));
                    leaves.position.y = 8;
                    tree.add(leaves);
                    tree.position.set(pos.x, 0, pos.z);
                    scene.add(tree);
                }
            }
        }

        // --- NOUVELLE FONCTION : MURS INVISIBLES ---
        function checkCollisions() {
            const data = playerCar.userData;
            let minDistance = Infinity;
            let closestIndex = 0;

            // On trouve le point du circuit le plus proche
            for(let i=0; i<trackPoints.length; i++) {
                const d = playerCar.position.distanceTo(trackPoints[i]);
                if(d < minDistance) {
                    minDistance = d;
                    closestIndex = i;
                }
            }

            // Limite de la piste
            const trackLimit = TRACK_WIDTH / 2 - 1.5; // Un peu moins que la largeur pour ne pas toucher les bordures

            if(minDistance > trackLimit) {
                const safePoint = trackPoints[closestIndex];
                
                // Calculer le vecteur de poussée pour ramener la voiture sur la piste
                const pushVec = new THREE.Vector3().subVectors(safePoint, playerCar.position);
                pushVec.y = 0;
                pushVec.normalize();
                
                // On repousse la voiture vers le centre
                const overlap = minDistance - trackLimit;
                playerCar.position.add(pushVec.multiplyScalar(overlap));
                
                // On réduit légèrement la vitesse pour simuler le frottement contre le mur
                data.speed *= 0.95;
            }
        }

        function updatePlayer() {
            const data = playerCar.userData;
            if (keys['ArrowUp'] || keys['KeyW']) data.speed += data.acceleration;
            if (keys['ArrowDown'] || keys['KeyS']) data.speed -= data.acceleration * 2;
            if (data.speed !== 0) {
                let turnFactor = Math.min(Math.abs(data.speed) * 0.7, 1.0);
                if (keys['ArrowLeft'] || keys['KeyA']) data.angle += 0.04 * turnFactor;
                if (keys['ArrowRight'] || keys['KeyD']) data.angle -= 0.04 * turnFactor;
            }
            data.speed *= 0.99; 
            data.speed = Math.min(Math.max(data.speed, -data.maxSpeed / 2), data.maxSpeed);
            
            // Appliquer le mouvement
            playerCar.rotation.y = data.angle;
            playerCar.position.x += Math.sin(data.angle) * data.speed;
            playerCar.position.z += Math.cos(data.angle) * data.speed;

            // Vérifier et corriger si on sort de la piste (murs invisibles)
            checkCollisions();

            document.getElementById('speedometer').innerText = Math.round(Math.abs(data.speed) * 160) + " km/h";
        }

        function updateAI() {
            aiCars.forEach(ai => {
                const data = ai.userData;
                const target = trackPoints[data.targetNode];
                const targetPos = target.clone();
                const nextNode = trackPoints[(data.targetNode + 1) % trackPoints.length];
                const tangent = new THREE.Vector3().subVectors(nextNode, target).normalize();
                const lateral = new THREE.Vector3(-tangent.z, 0, tangent.x).multiplyScalar(data.offset);
                targetPos.add(lateral);

                const direction = new THREE.Vector3().subVectors(targetPos, ai.position);
                direction.y = 0;

                const desiredRotation = Math.atan2(direction.x, direction.z);
                let diff = desiredRotation - ai.rotation.y;
                while (diff < -Math.PI) diff += Math.PI * 2;
                while (diff > Math.PI) diff -= Math.PI * 2;
                ai.rotation.y += diff * data.rotationSmooth;

                ai.position.x += Math.sin(ai.rotation.y) * data.speed;
                ai.position.z += Math.cos(ai.rotation.y) * data.speed;

                if (ai.position.distanceTo(targetPos) < 25) {
                    data.targetNode = (data.targetNode + 1) % trackPoints.length;
                }
            });
        }

        function updateCamera() {
            const data = playerCar.userData;
            const speedFactor = Math.abs(data.speed) / data.maxSpeed;
            const camDist = 12 + (speedFactor * 4); 
            const camHeight = 5 - (speedFactor * 1.5); 
            const offset = new THREE.Vector3(-Math.sin(playerCar.rotation.y) * camDist, camHeight, -Math.cos(playerCar.rotation.y) * camDist);
            camera.position.lerp(playerCar.position.clone().add(offset), 0.1);
            camera.lookAt(playerCar.position.clone().add(new THREE.Vector3(Math.sin(playerCar.rotation.y) * 15, 1.5, Math.cos(playerCar.rotation.y) * 15)));
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            updatePlayer();
            updateAI();
            updateCamera();
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
